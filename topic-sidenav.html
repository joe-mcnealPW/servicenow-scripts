<div class="topic-side-nav">
  <div class="topic-side-nav__header" ng-if="c.options.title">
    <span class="topic-side-nav__title">{{c.options.title}}</span>
  </div>
  <ul class="topic-side-nav__list" role="tablist" aria-label="{{c.options.title || 'Section Navigation'}}">
    <li class="topic-side-nav__item"
        ng-repeat="section in c.sections track by section.id"
        ng-class="{'is-active': c.activeId === section.id}"
        role="tab"
        aria-selected="{{c.activeId === section.id}}"
        tabindex="{{c.activeId === section.id ? 0 : -1}}"
        ng-click="c.setActive(section.id)"
        ng-keydown="c.handleKeydown($event, $index)">
      <i class="fa {{section.icon}}" ng-if="section.icon" aria-hidden="true"></i>
      <span class="topic-side-nav__label">{{section.label || section.id}}</span>
    </li>
  </ul>
</div>

<style>

 /* Topic Side Navigation */

.topic-side-nav {
  background: #ffffff;
  border-left: 4px solid #cc0000;
  font-family: "Source Sans Pro", Arial, sans-serif;
}

.topic-side-nav .topic-side-nav__header {
  padding: 12px 16px 4px;
}

.topic-side-nav .topic-side-nav__title {
  font-size: 16px;
  font-weight: 700;
  color: #333333;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.topic-side-nav .topic-side-nav__list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.topic-side-nav .topic-side-nav__item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  color: #1a73a7;
  font-size: 14px;
  border-bottom: 1px solid #e8e8e8;
  transition: background-color 0.15s ease;
  user-select: none;
}

.topic-side-nav .topic-side-nav__item:last-child {
  border-bottom: none;
}

.topic-side-nav .topic-side-nav__item:hover {
  background-color: #f5f5f5;
}

.topic-side-nav .topic-side-nav__item:focus {
  outline: 2px solid #1a73a7;
  outline-offset: -2px;
}

.topic-side-nav .topic-side-nav__item.is-active {
  background-color: #ffffff;
  color: #1a73a7;
  font-weight: 600;
  box-shadow: inset 3px 0 0 0 #1a73a7;
}

.topic-side-nav .topic-side-nav__item .fa {
  width: 24px;
  text-align: center;
  font-size: 16px;
  flex-shrink: 0;
}

.topic-side-nav .topic-side-nav__label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>

<script>
  api.controller = function ($scope, $rootScope) {
  var c = this;

    //[{"id":"about","label":"About","icon":"fa-question-circle"},{"id":"apps","label":"Apps","icon":"fa-desktop"},{"id":"service_requests","label":"ServiceRequests","icon":"fa-minus-circle"},{"id":"sub_pages","label":"SubPages","icon":"fa-file-o"},{"id":"videos","label":"Videos","icon":"fa-play-circle"},{"id":"org_chart","label":"OrgChart","icon":"fa-sitemap"}]

  // Parse sections from the widget option (JSON string -> array)
  c.sections = [];
  c.activeId = null;

  function init() {
    var raw = c.options.sections;

    if (angular.isString(raw)) {
      try {
        c.sections = JSON.parse(raw);
      } catch (e) {
        console.error("Topic Side Navigation: Invalid sections JSON", e);
        c.sections = [];
      }
    } else if (angular.isArray(raw)) {
      c.sections = raw;
    }

    // Set initial active section: first item by default
    if (c.sections.length > 0) {
      c.activeId = c.sections[0].id;
    }
  }

  /**
   * Set the active section and broadcast the change via $rootScope.
   */
  c.setActive = function (id) {
    if (c.activeId === id) return;

    c.activeId = id;

    $rootScope.$broadcast("topic-side-nav:activeChanged", {
      activeId: id
    });
  };

  /**
   * Keyboard navigation for accessibility.
   * Up/Down arrows move between items, Home/End jump to first/last.
   */
  c.handleKeydown = function ($event, index) {
    var key = $event.key;
    var newIndex = index;

    switch (key) {
      case "ArrowDown":
        $event.preventDefault();
        newIndex = Math.min(index + 1, c.sections.length - 1);
        break;
      case "ArrowUp":
        $event.preventDefault();
        newIndex = Math.max(index - 1, 0);
        break;
      case "Home":
        $event.preventDefault();
        newIndex = 0;
        break;
      case "End":
        $event.preventDefault();
        newIndex = c.sections.length - 1;
        break;
      case "Enter":
      case " ":
        $event.preventDefault();
        c.setActive(c.sections[index].id);
        return;
      default:
        return;
    }

    if (newIndex !== index) {
      c.setActive(c.sections[newIndex].id);
      // Move focus to the new item
      var items = $event.currentTarget.parentElement.children;
      if (items[newIndex]) {
        items[newIndex].focus();
      }
    }
  };

  // Listen for external active changes (other widgets can drive this nav)
  var deregister = $rootScope.$on("topic-side-nav:setActive", function (event, data) {
    if (data && data.activeId) {
      c.activeId = data.activeId;
    }
  });

  // Clean up listener on scope destroy
  $scope.$on("$destroy", deregister);

  init();
};
</script>
